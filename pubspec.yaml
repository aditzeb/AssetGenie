name: assetgenie
description: A command-line utility that connects to LLMs via standard I/O and provides tools to optimize, audit, and auto-generate assets and localization structures inside a local Flutter project directory.
version: 1.0.0
environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter_mcp_server: ^0.1.4
  path: ^1.8.3
  yaml: ^3.1.2

dev_dependencies:
  lints: ^2.1.0
  test: ^1.24.0
